sites:
  # --- HTML scraping (plain HTML, no JS rendering required) ---
  autosport-japan:
    source: html
    prefix_home: ""
    news_home: "https://www.as-web.jp/f1/news"
    scrape_title: ".news-list .title"
    get_title: "lambda x: x.get_text(strip=True)"
    scrape_link: "ul.news-list li a[href]"
    get_link: "lambda x: x['href']"

  # --- RSS feeds (JS-rendered sites → use RSS for reliability) ---
  motorsport-jp:
    source: rss
    news_home: "https://jp.motorsport.com/f1/news/"
    rss_url: "https://jp.motorsport.com/rss/f1/news/"

  motorsport-en:
    source: rss
    news_home: "https://www.motorsport.com/f1/news/"
    rss_url: "https://www.motorsport.com/rss/f1/news/"

  F1-Gate:
    source: rss
    news_home: "https://f1-gate.com"
    rss_url: "https://f1-gate.com/feed/"

  F1情報通:
    source: rss
    news_home: "http://f1jouhou2.blog.fc2.com"
    rss_url: "http://f1jouhou2.blog.fc2.com/?xml"

  BBC:
    source: rss
    news_home: "https://www.bbc.com/sport/formula1"
    rss_url: "https://feeds.bbci.co.uk/sport/formula1/rss.xml"

  skysports:
    source: rss
    news_home: "https://www.skysports.com/f1/news"
    rss_url: "https://www.skysports.com/rss/12040.xml"
